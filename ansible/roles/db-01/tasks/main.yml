---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install PostgreSQL and required packages
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
      - ufw
    state: present

- name: Enable and start PostgreSQL service
  systemd:
    name: postgresql
    enabled: yes
    state: started

- name: Create PostgreSQL database
  become_user: postgres
  postgresql_db:
    name: studentapp
    state: present

- name: Create PostgreSQL user
  become_user: postgres
  postgresql_user:
    name: studentadmin
    password: studentpass
    priv: "ALL"
    db: studentapp
    state: present

- name: Allow PostgreSQL user to connect to the database
  become_user: postgres
  postgresql_privs:
    database: studentapp
    role: studentadmin
    privs: ALL
    type: database
    state: present

- name: Configure PostgreSQL to listen on all interfaces
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version | default('16') }}/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
    state: present
  notify: Restart PostgreSQL

- name: Allow remote connections in pg_hba.conf
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version | default('16') }}/main/pg_hba.conf
    line: "host    studentapp      studentadmin    192.168.1.0/24      md5"
    state: present
  notify: Restart PostgreSQL

- name: Configure UFW — allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configure UFW — allow PostgreSQL from web subnet only
  ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: 192.168.1.0/24

- name: Enable UFW firewall
  ufw:
    state: enabled
    policy: deny
