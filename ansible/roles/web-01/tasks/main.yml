---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required system packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
    state: present

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Create application directory
  file:
    path: /opt/studentapp
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy Flask application files
  copy:
    src: "{{ playbook_dir }}/../"
    dest: /opt/studentapp/
    owner: ubuntu
    group: ubuntu
    exclude:
      - terraform/
      - ansible/
      - "*.md"

- name: Build and start Docker containers
  community.docker.docker_compose_v2:
    project_src: /opt/studentapp
    state: present
    build: always
  become_user: ubuntu

- name: Verify containers are running
  command: docker ps --filter "name=studentapp" --format "{{ '{{' }}.Names{{ '}}' }}"
  register: running_containers
  changed_when: false

- name: Print running containers
  debug:
    msg: "Running containers: {{ running_containers.stdout_lines }}"
